<h1>Hello, {{ title() }}</h1>

<h2>Welcome to the routing demo!</h2>

<nav>
  <ul>
    <li><a routerLink="/" routerLinkActive="active">Home</a></li>
    <li><a routerLink="/notes" routerLinkActive="active">Notes</a></li>
    <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
    <div>
      <li><a [routerLink]="['/notes', '1']">Note 1</a></li>
      <li><a [routerLink]="['/notes', '2']">Note 2</a></li>
      <li><a [routerLink]="['/notes', '3']">Note 3</a></li>
    </div>
    <div>
      <li><a routerLink="/about" routerLinkActive="active">About</a></li>
    </div>
    <br/>
    <div>
      <button (click)="navigateToNotes()">Go to Notes</button>
      <button (click)="navigateToNote(4)">Go to Note 4</button>
    </div>
  </ul>
</nav>
<router-outlet></router-outlet>
